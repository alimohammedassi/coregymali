name: coregym2
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1
  flutter: ">=3.8.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.0
  provider: ^6.1.0
  fl_chart: ^0.68.0
  supabase_flutter: ^2.5.0
  google_sign_in: ^6.2.1
  cupertino_icons: ^1.0.8
  glassy: ^0.0.6
  url_launcher: ^6.3.2
  http: ^1.6.0
  cached_network_image: ^3.4.1
  youtube_player_flutter: ^9.1.3
  intl: ^0.20.2
  shimmer: ^3.0.0
  native_glass_navbar: ^1.0.1
  app_links: ^6.0.0
  image_picker: ^1.2.1
  file_picker: ^11.0.2
  photo_view: ^0.15.0
  flutter_pdfview: ^1.4.4
  uuid: ^4.5.3
  flutter_riverpod: ^3.3.1
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
                    
