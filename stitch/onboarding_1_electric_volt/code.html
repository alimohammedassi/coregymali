        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-gradient {
            background: radial-gradient(circle at 20% 30%, rgba(212, 255, 0, 0.15) 0%, transparent 50%),

        }
        .text-sheared {
            transform: skewX(-10deg);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<!-- Kinetic Background Canvas -->
<div class="fixed inset-0 z-0 bg-surface-container-lowest">
<div class="absolute inset-0 kinetic-gradient"></div>
<!-- Blurred Lime Neon Orbs -->
<div class="absolute top-[-10%] left-[-10%] w-[600px] h-[600px] bg-primary-container/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[20%] right-[-5%] w-[400px] h-[400px] bg-secondary/10 rounded-full blur-[100px]"></div>

<div class="absolute inset-0 z-0 opacity-60 mix-blend-luminosity">

</div>
</div>

<!-- Header / Logo Area -->
<header class="flex justify-between items-center mb-8">
<div class="text-2xl font-black font-headline tracking-tighter italic text-primary-fixed">
                KINETIC
            </div>
<!-- Volt Badge -->
<div class="bg-primary-container/20 border border-primary/30 px-3 py-1 rounded-full">
<span class="text-[10px] font-black font-body tracking-[0.2em] text-primary-fixed">01/03</span>
</div>
</header>
<!-- Dynamic Content Space (Bleed) -->
<div class="flex-grow flex items-end pb-12">
<div class="relative">
<h1 class="text-7xl md:text-8xl font-black font-headline italic tracking-tighter leading-[0.85] text-white uppercase text-sheared -ml-4">
                    Unleash<br/>
<span class="text-primary-fixed">Your</span><br/>
                    Power
                </h1>
<div class="mt-4 h-[2px] w-24 bg-primary-container"></div>
</div>
</div>
<!-- Smoked Glass Bottom Sheet -->
<div class="bg-white/5 backdrop-blur-2xl rounded-t-[44px] border-t border-white/10 p-8 -mx-6 pb-12 shadow-[0_-20px_50px_rgba(0,0,0,0.5)]">
<div class="w-12 h-1 bg-white/20 rounded-full mx-auto mb-8"></div>
<div class="space-y-6">
<div class="space-y-2">
<p class="text-on-surface-variant text-sm font-medium leading-relaxed max-w-[85%]">

                    </p>
</div>

<button class="w-full bg-primary-fixed hover:bg-primary-dim active:scale-[0.98] transition-all py-5 rounded-full flex items-center justify-center group">
<span class="text-on-primary-fixed font-black font-body text-xs uppercase tracking-[0.2em]">Initiate Engine</span>
<span class="material-symbols-outlined ml-2 text-on-primary-fixed group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Secondary Action -->
<div class="flex justify-center">
<button class="text-on-surface-variant hover:text-white transition-colors text-[10px] font-bold uppercase tracking-widest py-2">

                    </button>
</div>
</div>
</div>

<div class="fixed top-1/2 -right-12 -translate-y-1/2 rotate-90 pointer-events-none opacity-5">
<span class="text-[120px] font-black font-headline italic tracking-tighter text-white whitespace-nowrap">
