</div>

</div>

</div>
<div class="text-right border-r-2 border-primary-fixed/30 pr-4">
<p class="font-label text-xs text-on-surface-variant uppercase mb-1">Time Elapsed</p>
<p class="font-headline italic text-4xl text-on-surface">42:10</p>
</div>
</div>
